syntax = "proto3";

option java_multiple_files = true;

package anki.stats;

import "anki/generic.proto";
import "anki/cards.proto";

service StatsService {
  rpc CardStats(cards.CardId) returns (CardStatsResponse);
  rpc GetReviewLogs(cards.CardId) returns (ReviewLogs);
  rpc Graphs(GraphsRequest) returns (GraphsResponse);
  rpc GetGraphPreferences(generic.Empty) returns (GraphPreferences);
  rpc SetGraphPreferences(GraphPreferences) returns (generic.Empty);
  // USMLE project addition: per-topic mastery aggregation (the "mastery query").
  rpc MasteryByTopic(MasteryByTopicRequest) returns (MasteryByTopicResponse);
  // USMLE project addition: the study dashboard (Memory + Coverage + Readiness).
  rpc StudyDashboard(StudyDashboardRequest) returns (StudyDashboardResponse);
  // USMLE project addition (dev/admin "simulation mode"): bulk-set FSRS state on
  // matched cards, so a demo collection can be driven into any memory state.
  rpc AdminSetFsrs(AdminSetFsrsRequest) returns (AdminOpResponse);
  // USMLE project addition (dev/admin "simulation mode"): simulate N days passing
  // with no study by shifting matched cards' last-review time back N days.
  rpc AdminAdvanceDays(AdminAdvanceDaysRequest) returns (AdminOpResponse);
  // USMLE project addition (dev/admin "simulation mode"): reset matched cards to
  // "not learned yet" (new), optionally a random percentage of them.
  rpc AdminResetCards(AdminResetCardsRequest) returns (AdminOpResponse);
}

// Implicitly includes any of the above methods that are not listed in the
// backend service.
service BackendStatsService {}

// ---- USMLE project: mastery query -----------------------------------------
// Aggregates per-card FSRS state into per-topic stats, where a "topic" is a
// tag at a configurable prefix + depth (default: First Aid section tags).

message MasteryByTopicRequest {
  // Optional card search to scope the query (empty = whole collection).
  string search = 1;
  // Only tags starting with this prefix are treated as topics
  // (e.g. "#AK_Step1_v11::#FirstAid::"). Empty = every top-level tag is a topic.
  string tag_prefix = 2;
  // How many "::"-separated components after the prefix form the topic key.
  // 0 is treated as 1. Default caller value: 1 (the section level).
  uint32 topic_depth = 3;
}

message TopicMastery {
  // Full topic tag path (prefix + the first `topic_depth` components).
  string topic = 1;
  // Total cards under this topic (includes new/unseen cards).
  uint32 total_cards = 2;
  // Cards considered "mastered" = review cards with interval >= 21 days.
  uint32 cards_mastered = 3;
  // Mean FSRS retrievability (0..1) across all cards in the topic;
  // new/unseen cards (no memory state) count as 0.
  float average_recall = 4;
}

message MasteryByTopicResponse {
  repeated TopicMastery topics = 1;
}

// ---- USMLE project: study dashboard (Memory + Coverage + Readiness) --------

message StudyDashboardRequest {
  // Optional card search to scope the dashboard (empty = whole collection).
  string search = 1;
  // Tag prefix that defines the outline topics (e.g. First Aid sections).
  string tag_prefix = 2;
  // Components after the prefix that form a topic key. 0 is treated as 1.
  uint32 topic_depth = 3;
  // Days-from-now to project readiness at. Empty -> [0, 5] (today and +5 days).
  repeated uint32 readiness_horizons_days = 4;
  // Give-up rule: minimum all-time graded reviews. 0 -> default 200.
  uint32 min_graded_reviews = 5;
  // Give-up rule: minimum outline coverage (0..1). 0 -> default 0.5.
  float min_coverage = 6;
}

// Memory ~= aggregated FSRS recall over studied cards, with honest uncertainty.
message DashboardMemoryHorizon {
  // Days forward with no further study (0 = now).
  uint32 days = 1;
  // Mean recall over the studied cards at this horizon.
  float mean_recall = 2;
}

message DashboardMemory {
  float mean_recall = 1;
  // Normal-approx confidence interval on the mean (narrows as data grows).
  float ci_low = 2;
  float ci_high = 3;
  uint32 studied_cards = 4;
  // Ungated over-confidence view: mean recall over the SAME studied cards
  // projected forward with no further study, one entry per requested horizon
  // (days 0 = now). Always reported (not blocked by the give-up rule) because
  // it is a memory fact, not a readiness claim.
  repeated DashboardMemoryHorizon horizons = 5;
}

message DashboardCoverage {
  // Outline cards seen at least once / total outline cards (0..1).
  float fraction = 1;
  uint32 cards_seen = 2;
  uint32 total_cards = 3;
}

message DashboardReadiness {
  uint32 horizon_days = 1;
  float p_pass = 2;
  float range_low = 3;
  float range_high = 4;
  // Coverage-weighted mean projected recall feeding p_pass (unseen = 0).
  float mean_projected_recall = 5;
}

message StudyDashboardResponse {
  DashboardMemory memory = 1;
  DashboardCoverage coverage = 2;
  uint32 graded_reviews = 3;
  // Give-up rule outcome: readiness is only populated when this is true.
  bool readiness_available = 4;
  // Human-readable list of what is still missing when abstaining.
  repeated string readiness_blocked_reasons = 5;
  // One entry per requested horizon; empty when abstaining.
  repeated DashboardReadiness readiness = 6;
  // Over-confidence signal: fraction of studied cards with high recall now but
  // low stability (recallable today, will decay fast).
  float fragile_fraction = 7;
  // Per-topic rows (the coverage/mastery map).
  repeated TopicMastery topics = 8;
  // Single best next thing to study (a topic), per the honesty rules.
  string next_best_topic = 9;
}

// ---- USMLE project: admin / simulation mode --------------------------------
// Developer tooling to set up demo/test states. NOT part of the honest scoring
// path; these mutate the collection directly and are gated behind a UI toggle.

message AdminSetFsrsRequest {
  // Cards to affect (empty = whole collection).
  string search = 1;
  // FSRS stability in days (S). Clamped to a small positive minimum.
  float stability = 2;
  // FSRS difficulty (D), clamped to 1..10.
  float difficulty = 3;
  // Target current retrievability (R), 0..1. Applied by back-dating the card's
  // last-review time so that R now == this value for the given stability.
  float target_retrievability = 4;
  // Randomly apply to this percentage (1..100) of the matched cards.
  // 0 or >=100 means "all matched cards".
  uint32 sample_percent = 5;
}

message AdminAdvanceDaysRequest {
  // Cards to affect (empty = whole collection).
  string search = 1;
  // Number of days of "no study" to simulate (shifts last-review time back).
  uint32 days = 2;
}

message AdminResetCardsRequest {
  // Cards to affect (empty = whole collection).
  string search = 1;
  // Randomly reset this percentage (1..100) of the matched cards to new.
  // 0 or >=100 means "all matched cards".
  uint32 sample_percent = 2;
}

message AdminOpResponse {
  // Number of cards modified.
  uint32 updated = 1;
}

message ReviewLogs {
  repeated CardStatsResponse.StatsRevlogEntry entries = 1;
}

message CardStatsResponse {
  message StatsRevlogEntry {
    int64 time = 1;
    RevlogEntry.ReviewKind review_kind = 2;
    uint32 button_chosen = 3;
    // seconds
    uint32 interval = 4;
    // per mill
    uint32 ease = 5;
    float taken_secs = 6;
    optional cards.FsrsMemoryState memory_state = 7;
    // seconds
    uint32 last_interval = 8;
  }
  repeated StatsRevlogEntry revlog = 1;
  int64 card_id = 2;
  int64 note_id = 3;
  string deck = 4;
  // Unix timestamps
  int64 added = 5;
  optional int64 first_review = 6;
  optional int64 latest_review = 7;
  optional int64 due_date = 8;
  optional int32 due_position = 9;
  // days
  uint32 interval = 10;
  // per mill
  uint32 ease = 11;
  uint32 reviews = 12;
  uint32 lapses = 13;
  float average_secs = 14;
  float total_secs = 15;
  string card_type = 16;
  string notetype = 17;
  optional cards.FsrsMemoryState memory_state = 18;
  // not set if due date/state not available
  optional float fsrs_retrievability = 19;
  string custom_data = 20;
  string preset = 21;
  optional string original_deck = 22;
  optional float desired_retention = 23;
  repeated float fsrs_params = 24;
}

message GraphsRequest {
  string search = 1;
  uint32 days = 2;
}

message GraphsResponse {
  message Added {
    map<int32, uint32> added = 1;
  }
  message Intervals {
    map<uint32, uint32> intervals = 1;
  }
  message Eases {
    map<uint32, uint32> eases = 1;
    float average = 2;
  }
  message Retrievability {
    map<uint32, uint32> retrievability = 1;
    float average = 2;
    float sum_by_card = 3;
    float sum_by_note = 4;
  }
  message FutureDue {
    map<int32, uint32> future_due = 1;
    bool have_backlog = 2;
    uint32 daily_load = 3;
  }
  message Today {
    uint32 answer_count = 1;
    uint32 answer_millis = 2;
    uint32 correct_count = 3;
    uint32 mature_correct = 4;
    uint32 mature_count = 5;
    uint32 learn_count = 6;
    uint32 review_count = 7;
    uint32 relearn_count = 8;
    uint32 early_review_count = 9;
  }
  // each bucket is a 24 element vec
  message Hours {
    message Hour {
      uint32 total = 1;
      uint32 correct = 2;
    }
    repeated Hour one_month = 1;
    repeated Hour three_months = 2;
    repeated Hour one_year = 3;
    repeated Hour all_time = 4;
  }
  message ReviewCountsAndTimes {
    message Reviews {
      uint32 learn = 1;
      uint32 relearn = 2;
      uint32 young = 3;
      uint32 mature = 4;
      uint32 filtered = 5;
    }
    map<int32, Reviews> count = 1;
    map<int32, Reviews> time = 2;
  }
  // 4 element vecs for buttons 1-4
  message Buttons {
    message ButtonCounts {
      repeated uint32 learning = 1;
      repeated uint32 young = 2;
      repeated uint32 mature = 3;
    }
    ButtonCounts one_month = 1;
    ButtonCounts three_months = 2;
    ButtonCounts one_year = 3;
    ButtonCounts all_time = 4;
  }
  message CardCounts {
    message Counts {
      uint32 newCards = 1;
      uint32 learn = 2;
      uint32 relearn = 3;
      uint32 young = 4;
      uint32 mature = 5;
      uint32 suspended = 6;
      uint32 buried = 7;
    }
    // Buried/suspended cards are included in counts; suspended/buried counts
    // are 0.
    Counts including_inactive = 1;
    // Buried/suspended cards are counted separately.
    Counts excluding_inactive = 2;
  }
  message TrueRetentionStats {
    message TrueRetention {
      uint32 young_passed = 1;
      uint32 young_failed = 2;
      uint32 mature_passed = 3;
      uint32 mature_failed = 4;
    }

    TrueRetention today = 1;
    TrueRetention yesterday = 2;
    TrueRetention week = 3;
    TrueRetention month = 4;
    TrueRetention year = 5;
    TrueRetention all_time = 6;
  }

  Buttons buttons = 1;
  CardCounts card_counts = 2;
  Hours hours = 3;
  Today today = 4;
  Eases eases = 5;
  Eases difficulty = 11;
  Intervals intervals = 6;
  FutureDue future_due = 7;
  Added added = 8;
  ReviewCountsAndTimes reviews = 9;
  uint32 rollover_hour = 10;
  Retrievability retrievability = 12;
  bool fsrs = 13;
  Intervals stability = 14;
  TrueRetentionStats true_retention = 15;
}

message GraphPreferences {
  enum Weekday {
    SUNDAY = 0;
    MONDAY = 1;
    FRIDAY = 5;
    SATURDAY = 6;
  }
  Weekday calendar_first_day_of_week = 1;
  bool card_counts_separate_inactive = 2;
  bool browser_links_supported = 3;
  bool future_due_show_backlog = 4;
}

message RevlogEntry {
  enum ReviewKind {
    LEARNING = 0;
    REVIEW = 1;
    RELEARNING = 2;
    FILTERED = 3;
    MANUAL = 4;
    RESCHEDULED = 5;
  }
  int64 id = 1;
  int64 cid = 2;
  int32 usn = 3;
  uint32 button_chosen = 4;
  int32 interval = 5;
  int32 last_interval = 6;
  uint32 ease_factor = 7;
  uint32 taken_millis = 8;
  ReviewKind review_kind = 9;
}

message CardEntry {
  int64 id = 1;
  int64 note_id = 2;
  int64 deck_id = 3;
}

message DeckEntry {
  int64 id = 1;
  int64 parent_id = 2;
  int64 preset_id = 3;
}

message Dataset {
  repeated RevlogEntry revlogs = 1;
  repeated CardEntry cards = 2;
  repeated DeckEntry decks = 3;
  int64 next_day_at = 4;
}
